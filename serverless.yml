# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: juantaype
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: serverless-rimac-prueba-tecnica
# "service" is the name of this project. This will also be added to your AWS resource names.
service: rimac-appointment

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    STAGE: ${self:provider.stage}
    REGION: ${self:provider.region}
    DYNAMODB_TABLE: ${self:service}-appointments-${self:provider.stage}
    SNS_TOPIC_ARN: !Ref AppointmentTopic
    SQS_CONFIRMATION_URL: !Ref AppointmentConfirmationQueue
    SQS_PE_URL: !Ref AppointmentQueuePE
    SQS_CL_URL: !Ref AppointmentQueueCL

  iam:
    role:
      statements:
        # DynamoDB
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource:
            - !GetAtt AppointmentsTable.Arn
            - !Sub "${AppointmentsTable.Arn}/index/*"
        # SNS
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: !Ref AppointmentTopic
        # SQS
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt AppointmentQueuePE.Arn
            - !GetAtt AppointmentQueueCL.Arn
            - !GetAtt AppointmentConfirmationQueue.Arn
        # EventBridge
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource: !Sub "arn:aws:events:${self:provider.region}:*:event-bus/default"

# plugins:
# - serverless-esbuild # ya soporta de froma nativa la v4

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    tsconfig: ./tsconfig.json
    format: cjs
    exclude:
      - "@aws-sdk/*"

# List de funciones Lambda que necesitamos
# appointment (POST /appointments + SQS consumer)
# appointment (GET /appointments/{insured_id})
# appointment-pe / appointment-cl (SQS consumers + MySQL)
# appointment (SQS confirmation consumer → DynamoDB update)
functions:
  # ------------------------------------------------------------------
  # Lambda: appointment
  # HTTP POST /appointments — Registra la solicitud de agendamiento
  # ------------------------------------------------------------------
  appointmentCreate:
    handler: src/functions/appointment/infrastructure/http/create-appointment.handler
    description: "Registra un nuevo agendamiento médico (POST /appointments)"
    events:
      - http:
          path: appointments
          method: post
          cors: true

  # ------------------------------------------------------------------
  # Lambda: appointment
  # HTTP GET /appointments/{insuredId} — Lista agendamientos por asegurado
  # ------------------------------------------------------------------
  appointmentList:
    handler: src/functions/appointment/infrastructure/http/get-appointments.handler
    description: "Lista los agendamientos de un asegurado por insured_id (GET /appointments/{insuredId}) segun requerimiento"
    events:
      - http:
          path: appointments/{insuredId}
          method: get
          cors: true
          request:
            parameters:
              paths:
                insuredId: true

  # ------------------------------------------------------------------
  # Lambda: appointment_pe
  # SQS consumer — Procesa agendamientos de Perú y guarda en MySQL PE
  # ------------------------------------------------------------------
  appointmentPe:
    handler: src/functions/appointment-pe/infrastructure/sqs/appointment-pe.handler
    description: "Procesa agendamientos de Perú desde SQS_PE y persiste en MySQL PE"
    environment:
      # LOCAL: usar variables de entorno del sistema (setear en terminal antes de npm run dev)
      # DB_PE_HOST: ${env:DB_PE_HOST, ''}
      # DB_PE_PORT: ${env:DB_PE_PORT, '3306'}
      # DB_PE_USER: ${env:DB_PE_USER, ''}
      # DB_PE_PASSWORD: ${env:DB_PE_PASSWORD, ''}
      # DB_PE_NAME: ${env:DB_PE_NAME, ''}
      # AWS: parámetros desde SSM Parameter Store
      DB_PE_HOST: ${ssm:/rimac/${self:provider.stage}/DB_PE_HOST}
      DB_PE_PORT: ${ssm:/rimac/${self:provider.stage}/DB_PE_PORT}
      DB_PE_USER: ${ssm:/rimac/${self:provider.stage}/DB_PE_USER}
      DB_PE_PASSWORD: ${ssm:/rimac/${self:provider.stage}/DB_PE_PASSWORD}
      DB_PE_NAME: ${ssm:/rimac/${self:provider.stage}/DB_PE_NAME}
    events:
      - sqs:
          arn: !GetAtt AppointmentQueuePE.Arn
          batchSize: 1

  # ------------------------------------------------------------------
  # Lambda: appointment_cl
  # SQS consumer — Procesa agendamientos de Chile y guarda en MySQL CL
  # ------------------------------------------------------------------
  appointmentCl:
    handler: src/functions/appointment-cl/infrastructure/sqs/appointment-cl.handler
    description: "Procesa agendamientos de Chile desde SQS_CL y persiste en MySQL CL"
    environment:
      # LOCAL: usar variables de entorno del sistema (setear en terminal antes de npm run dev)
      # DB_CL_HOST: ${env:DB_CL_HOST, ''}
      # DB_CL_PORT: ${env:DB_CL_PORT, '3306'}
      # DB_CL_USER: ${env:DB_CL_USER, ''}
      # DB_CL_PASSWORD: ${env:DB_CL_PASSWORD, ''}
      # DB_CL_NAME: ${env:DB_CL_NAME, ''}
      # AWS: parámetros desde SSM Parameter Store
      DB_CL_HOST: ${ssm:/rimac/${self:provider.stage}/DB_CL_HOST}
      DB_CL_PORT: ${ssm:/rimac/${self:provider.stage}/DB_CL_PORT}
      DB_CL_USER: ${ssm:/rimac/${self:provider.stage}/DB_CL_USER}
      DB_CL_PASSWORD: ${ssm:/rimac/${self:provider.stage}/DB_CL_PASSWORD}
      DB_CL_NAME: ${ssm:/rimac/${self:provider.stage}/DB_CL_NAME}
    events:
      - sqs:
          arn: !GetAtt AppointmentQueueCL.Arn
          batchSize: 1

  # ------------------------------------------------------------------
  # Lambda: appointment (SQS consumer de confirmación)
  # Consume SQS confirmation → actualiza DynamoDB a status=completed
  # Cierra el ciclo completo del agendamiento (paso 6 del flujo)
  # ------------------------------------------------------------------
  appointmentConfirmation:
    handler: src/functions/appointment/infrastructure/sqs/appointment-confirmation.handler
    description: "Consume SQS de confirmación y actualiza el agendamiento a 'completed' en DynamoDB"
    events:
      - sqs:
          arn: !GetAtt AppointmentConfirmationQueue.Arn
          batchSize: 1

resources:
  Resources:
    # DynamoDB - Tabla principal de agendamientos
    # Partition key: appointment_id (UUID)
    # GSI: insured_id-index para consultas por asegurado
    AppointmentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE} #Nombre de tabla dinámico por stage
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: appointment_id
            AttributeType: S
          - AttributeName: insured_id
            AttributeType: S
        KeySchema:
          - AttributeName: appointment_id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: insured_id-index
            KeySchema:
              - AttributeName: insured_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    # SNS - Tópico central con filtro por country_iso

    # PE → SQS_PE | CL → SQS_CL
    AppointmentTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-topic-${self:provider.stage}
        DisplayName: Rimac Appointment Topic

    # SQS - Perú
    AppointmentQueuePE:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-sqs-pe-${self:provider.stage}
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt AppointmentQueuePEDLQ.Arn
          maxReceiveCount: 3
          # TODO: Implementar lógica de manejo de fallos y reintentos con DLQ

    AppointmentQueuePEDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-sqs-pe-dlq-${self:provider.stage}

    # Suscripción SNS → SQS PE con filtro por país
    AppointmentSNSSubscriptionPE:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: !Ref AppointmentTopic
        Protocol: sqs
        Endpoint: !GetAtt AppointmentQueuePE.Arn
        FilterPolicy:
          country_iso:
            - PE

    AppointmentQueuePEPolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref AppointmentQueuePE
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal:
                Service: sns.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt AppointmentQueuePE.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn: !Ref AppointmentTopic

    # SQS - Chile
    AppointmentQueueCL:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-sqs-cl-${self:provider.stage}
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt AppointmentQueueCLDLQ.Arn
          maxReceiveCount: 3
          # TODO: Implementar lógica de manejo de fallos y reintentos con DLQ

    AppointmentQueueCLDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-sqs-cl-dlq-${self:provider.stage}

    # Suscripción SNS → SQS CL con filtro por país
    AppointmentSNSSubscriptionCL:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: !Ref AppointmentTopic
        Protocol: sqs
        Endpoint: !GetAtt AppointmentQueueCL.Arn
        FilterPolicy:
          country_iso:
            - CL

    AppointmentQueueCLPolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref AppointmentQueueCL
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal:
                Service: sns.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt AppointmentQueueCL.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn: !Ref AppointmentTopic

    # SQS - Confirmación (recibe eventos de EventBridge)
    AppointmentConfirmationQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-sqs-confirmation-${self:provider.stage}
        VisibilityTimeout: 60

    # EventBridge - Regla para evento appointment-confirmed
    # appointment_pe / appointment_cl → EventBridge → SQS → appointment
    AppointmentConfirmedRule:
      Type: AWS::Events::Rule
      Properties:
        Name: ${self:service}-appointment-confirmed-${self:provider.stage}
        EventBusName: default
        EventPattern:
          source:
            - rimac.appointment
          detail-type:
            - appointment_confirmed
        State: ENABLED
        Targets:
          - Arn: !GetAtt AppointmentConfirmationQueue.Arn
            Id: AppointmentConfirmationQueueTarget

    AppointmentConfirmationQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref AppointmentConfirmationQueue
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt AppointmentConfirmationQueue.Arn

  Outputs:
    AppointmentsTableName:
      Value: !Ref AppointmentsTable
      Export:
        Name: ${self:service}-${self:provider.stage}-AppointmentsTableName

    AppointmentTopicArn:
      Value: !Ref AppointmentTopic
      Export:
        Name: ${self:service}-${self:provider.stage}-AppointmentTopicArn

    AppointmentQueuePEUrl:
      Value: !Ref AppointmentQueuePE
      Export:
        Name: ${self:service}-${self:provider.stage}-AppointmentQueuePEUrl

    AppointmentQueueCLUrl:
      Value: !Ref AppointmentQueueCL
      Export:
        Name: ${self:service}-${self:provider.stage}-AppointmentQueueCLUrl

    AppointmentConfirmationQueueUrl:
      Value: !Ref AppointmentConfirmationQueue
      Export:
        Name: ${self:service}-${self:provider.stage}-AppointmentConfirmationQueueUrl
